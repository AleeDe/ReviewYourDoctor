<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.08" />
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <g stroke="#e0e0e0" stroke-width="5" fill="none" opacity="0.8">
    <circle cx="180" cy="220" r="70" />
    <rect x="110" y="330" width="140" height="60" rx="4" />
    <rect x="110" y="410" width="60" height="60" rx="4" />
    <rect x="190" y="410" width="60" height="60" rx="4" />
  </g>

  <g transform="translate(420, 150)" filter="url(#drop-shadow)">
    <rect x="0" y="0" width="280" height="550" rx="35" fill="#ffffff" stroke="#2c3e50" stroke-width="12" />
    
    <path d="M 80 0 L 80 15 Q 80 25 90 25 L 190 25 Q 200 25 200 15 L 200 0 Z" fill="#2c3e50" />
    
    <circle cx="140" cy="110" r="40" fill="#f1f3f5" stroke="oklch(0.648 0.171 151.7)" stroke-width="3" stroke-dasharray="6 4" />
    <path d="M 130 110 L 150 110 M 140 100 L 140 120" stroke="oklch(0.648 0.171 151.7)" stroke-width="4" stroke-linecap="round" />
    
    <text x="140" y="180" font-family="sans-serif" font-size="14" fill="oklch(0.648 0.171 151.7)" font-weight="bold" text-anchor="middle" letter-spacing="1">CREATE ACCOUNT</text>

    <text x="35" y="220" font-family="sans-serif" font-size="10" fill="#7f8c8d" font-weight="bold">Full Name</text>
    <rect x="35" y="230" width="210" height="30" rx="6" fill="#f1f3f5" />
    
    <text x="35" y="285" font-family="sans-serif" font-size="10" fill="#7f8c8d" font-weight="bold">Email Address</text>
    <rect x="35" y="295" width="210" height="30" rx="6" fill="#f1f3f5" />
    
    <text x="35" y="350" font-family="sans-serif" font-size="10" fill="#7f8c8d" font-weight="bold">Password</text>
    <rect x="35" y="360" width="210" height="30" rx="6" fill="#f1f3f5" />
    
    <g transform="translate(65, 420)">
      <rect x="0" y="0" width="150" height="45" rx="22.5" fill="oklch(0.648 0.171 151.7)">
         <animate attributeName="opacity" values="1; 0.7; 1" dur="2.5s" repeatCount="indefinite" />
      </rect>
      <text x="75" y="28" font-family="sans-serif" font-size="14" fill="oklch(0.985 0 0)" font-weight="bold" text-anchor="middle" letter-spacing="1">SIGN UP</text>
    </g>

    <circle cx="125" cy="500" r="4" fill="oklch(0.648 0.171 151.7)" />
    <circle cx="140" cy="500" r="4" fill="#cfd8dc" />
    <circle cx="155" cy="500" r="4" fill="#cfd8dc" />
  </g>

  <g transform="translate(330, 200)">
    <animateTransform attributeName="transform" type="translate" values="330,200; 330,185; 330,200" dur="4.5s" repeatCount="indefinite" ease="ease-in-out"/>
    
    <circle cx="50" cy="50" r="60" fill="none" stroke="oklch(0.648 0.171 151.7)" stroke-width="3" stroke-dasharray="10 10" opacity="0.6">
       <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="15s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="50" cy="50" r="45" fill="oklch(0.648 0.171 151.7)" filter="url(#glow)"/>
    
    <circle cx="50" cy="35" r="14" fill="oklch(0.985 0 0)"/>
    <path d="M 25 65 Q 50 40 75 65 Z" fill="oklch(0.985 0 0)"/>
    
    <circle cx="80" cy="20" r="18" fill="#ffffff" stroke="oklch(0.648 0.171 151.7)" stroke-width="3" />
    <path d="M 72 20 L 88 20 M 80 12 L 80 28" stroke="oklch(0.648 0.171 151.7)" stroke-width="4" stroke-linecap="round" />
  </g>

  <g fill="oklch(0.648 0.171 151.7)" opacity="0.8">
    <path d="M 310 170 Q 310 180 320 180 Q 310 180 310 190 Q 310 180 300 180 Q 310 180 310 170 Z">
      <animateTransform attributeName="transform" type="scale" values="1; 1.3; 1" dur="2s" repeatCount="indefinite" />
    </path>
    <path d="M 450 280 Q 450 285 455 285 Q 450 285 450 290 Q 450 285 445 285 Q 450 285 450 280 Z">
      <animateTransform attributeName="transform" type="scale" values="1; 1.5; 1" dur="3s" repeatCount="indefinite" />
    </path>
  </g>

  <g transform="translate(140, 480)">
    <ellipse cx="200" cy="210" rx="180" ry="15" fill="#e0e0e0" opacity="0.5" />
    
    <path d="M 50 200 Q 80 100 150 140 L 250 200 Z" fill="oklch(0.648 0.171 151.7)" />
    <line x1="80" y1="150" x2="180" y2="150" stroke="oklch(0.985 0 0)" stroke-width="4" opacity="0.5"/>
    <line x1="70" y1="170" x2="210" y2="170" stroke="oklch(0.985 0 0)" stroke-width="4" opacity="0.5"/>
    <line x1="60" y1="190" x2="230" y2="190" stroke="oklch(0.985 0 0)" stroke-width="4" opacity="0.5"/>
    
    <circle cx="140" cy="70" r="45" fill="#2c3e50" />
    <path d="M 95 70 L 90 130 Q 140 140 185 130 L 185 70 Z" fill="#2c3e50" />
    <circle cx="140" cy="90" r="35" fill="#a16d56" />
    <path d="M 105 75 Q 120 50 160 65 Q 140 40 110 55 Z" fill="#1a252f" />
    
    <path d="M 120 160 Q 230 250 290 140" fill="none" stroke="#a16d56" stroke-width="35" stroke-linecap="round" />
    
    <g transform="translate(260, 95) rotate(15)">
      <rect x="0" y="0" width="60" height="40" rx="4" fill="#ffffff" stroke="#bdc3c7" stroke-width="3"/>
      <rect x="0" y="0" width="60" height="12" fill="oklch(0.648 0.171 151.7)" rx="4"/>
      <circle cx="15" cy="24" r="8" fill="oklch(0.648 0.171 151.7)" opacity="0.4"/>
      <line x1="30" y1="20" x2="50" y2="20" stroke="#bdc3c7" stroke-width="3" stroke-linecap="round"/>
      <line x1="30" y1="28" x2="45" y2="28" stroke="#bdc3c7" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(650, 610)">
    <path d="M 35 50 Q 20 0 35 -40 Q 50 0 35 50" fill="#2c3e50" />
    <path d="M 25 50 Q 5 -10 10 -25 Q 20 15 25 50" fill="#2c3e50" opacity="0.8"/>
    <path d="M 45 50 Q 65 -10 60 -25 Q 50 15 45 50" fill="#2c3e50" opacity="0.8"/>
    <polygon points="10,50 60,50 50,85 20,85" fill="oklch(0.648 0.171 151.7)" />
    <rect x="5" y="50" width="60" height="6" rx="2" fill="oklch(0.648 0.171 151.7)" opacity="0.8" />
  </g>
</svg>
