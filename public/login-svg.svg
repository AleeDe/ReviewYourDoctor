<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.08" />
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <g stroke="#e0e0e0" stroke-width="5" fill="none" opacity="0.8">
    <rect x="120" y="150" width="140" height="140" rx="4" />
    <rect x="120" y="310" width="60" height="60" rx="4" />
    <rect x="200" y="310" width="60" height="60" rx="4" />
    <rect x="120" y="390" width="140" height="60" rx="4" />
  </g>

  <g transform="translate(420, 150)" filter="url(#drop-shadow)">
    <rect x="0" y="0" width="280" height="550" rx="35" fill="#ffffff" stroke="#2c3e50" stroke-width="12" />
    
    <path d="M 80 0 L 80 15 Q 80 25 90 25 L 190 25 Q 200 25 200 15 L 200 0 Z" fill="#2c3e50" />
    
    <circle cx="140" cy="130" r="50" fill="oklch(0.648 0.171 151.7)" opacity="0.25" />
    <circle cx="140" cy="115" r="20" fill="oklch(0.648 0.171 151.7)" />
    <path d="M 100 170 Q 140 120 180 170 Z" fill="oklch(0.648 0.171 151.7)" />
    <text x="140" y="200" font-family="sans-serif" font-size="14" fill="oklch(0.648 0.171 151.7)" font-weight="bold" text-anchor="middle" letter-spacing="2">LOGIN</text>

    <text x="35" y="250" font-family="sans-serif" font-size="11" fill="#7f8c8d" font-weight="bold">Email</text>
    <rect x="35" y="260" width="210" height="35" rx="6" fill="#f1f3f5" />
    <text x="35" y="320" font-family="sans-serif" font-size="11" fill="#7f8c8d" font-weight="bold">Password</text>
    <rect x="35" y="330" width="210" height="35" rx="6" fill="#f1f3f5" />
    
    <g transform="translate(65, 400)">
      <rect x="0" y="0" width="150" height="45" rx="22.5" fill="oklch(0.648 0.171 151.7)">
         <animate attributeName="opacity" values="1; 0.7; 1" dur="2.5s" repeatCount="indefinite" />
      </rect>
      <text x="75" y="28" font-family="sans-serif" font-size="14" fill="oklch(0.985 0 0)" font-weight="bold" text-anchor="middle" letter-spacing="1">LOGIN</text>
    </g>

    <circle cx="100" cy="480" r="12" fill="#3b5998" />
    <circle cx="140" cy="480" r="12" fill="#ea4335" />
    <circle cx="180" cy="480" r="12" fill="#2c3e50" />
  </g>

  <g transform="translate(360, 240)">
    <animateTransform attributeName="transform" type="translate" values="360,240; 360,225; 360,240" dur="4s" repeatCount="indefinite" ease="ease-in-out"/>
    
    <path d="M 35 40 L 35 25 A 25 25 0 0 1 85 25 L 85 40" fill="none" stroke="#bdc3c7" stroke-width="12" stroke-linecap="round" />
    <rect x="10" y="40" width="100" height="80" rx="8" fill="oklch(0.648 0.171 151.7)" filter="url(#glow)"/>
    <circle cx="60" cy="70" r="8" fill="oklch(0.985 0 0)" />
    <path d="M 56 75 L 64 75 L 62 90 L 58 90 Z" fill="oklch(0.985 0 0)" />
  </g>

  <g transform="translate(140, 480)">
    <ellipse cx="200" cy="210" rx="180" ry="15" fill="#e0e0e0" opacity="0.5" />
    
    <path d="M 50 200 Q 80 100 150 140 L 250 200 Z" fill="oklch(0.648 0.171 151.7)" />
    <circle cx="120" cy="150" r="3" fill="oklch(0.985 0 0)" opacity="0.6" />
    <circle cx="140" cy="170" r="3" fill="oklch(0.985 0 0)" opacity="0.6" />
    <circle cx="100" cy="180" r="3" fill="oklch(0.985 0 0)" opacity="0.6" />
    
    <circle cx="125" cy="40" r="25" fill="#2c3e50" />
    <path d="M 80 120 Q 90 50 140 50 Q 180 60 170 120 Z" fill="#2c3e50" />
    <circle cx="140" cy="90" r="35" fill="#a16d56" />
    
    <path d="M 120 160 Q 230 250 290 140" fill="none" stroke="#a16d56" stroke-width="35" stroke-linecap="round" />
    
    <g transform="translate(280, 100) rotate(25)">
      <rect x="0" y="0" width="40" height="75" rx="6" fill="#455a64" />
      <rect x="4" y="4" width="32" height="67" rx="3" fill="#cfd8dc" />
    </g>
  </g>

  <g transform="translate(650, 610)">
    <path d="M 30 50 Q 10 20 5 -10" fill="none" stroke="#2c3e50" stroke-width="2" />
    <path d="M 30 50 Q 50 20 60 -5" fill="none" stroke="#2c3e50" stroke-width="2" />
    <circle cx="5" cy="-10" r="8" fill="oklch(0.648 0.171 151.7)" />
    <circle cx="60" cy="-5" r="8" fill="oklch(0.648 0.171 151.7)" />
    <polygon points="15,50 45,50 40,90 20,90" fill="oklch(0.648 0.171 151.7)" />
  </g>
</svg>
